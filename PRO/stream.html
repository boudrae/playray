<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYRAY - Live Stream</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* --- 1. VARIABLES & THEMES (Synced with Index) --- */
:root {
--bg-color: #0b0f1a;
--card-bg: #1e2533;
--card-border: rgba(255, 255, 255, 0.08);
--text-primary: #ffffff;
--text-secondary: #94a3b8;
--header-bg: rgba(11, 15, 26, 0.9);
--accent-gradient: linear-gradient(90deg, #ff5f00, #ffc400, #20e2af, #00d2ff, #7a5fff, #ff2d55);
--card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
--pill-bg: #232a3b;
--header-border: rgba(255, 255, 255, 0.08);
--live-red: #ff3b3b;
--live-glow: rgba(255, 59, 59, 0.4);
--toggle-bg: #232a3b;
--player-bg: #000000;
--match-bar-bg: #161b26;
}

[data-theme="light"] {
    --bg-color: #f1f5f9;
    --card-bg: #ffffff;
    --card-border: rgba(0, 0, 0, 0.08);
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --header-bg: #dc2626; 
    --header-border: rgba(255, 255, 255, 0.2);
    --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    --toggle-bg: rgba(0,0,0,0.1);
    --match-bar-bg: #ffffff;
}

/* --- 2. BASE STYLES --- */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    transition: background-color 0.3s ease, color 0.3s ease;
}

body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    padding-bottom: 50px;
    -webkit-font-smoothing: antialiased;
}

/* --- 3. HEADER (Mirroring Index) --- */
header {
    background-color: var(--header-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid var(--header-border);
}

.logo { 
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px; 
    font-weight: 900; 
    letter-spacing: 1px; 
    color: #fff; 
    text-transform: uppercase;
}

/* Theme Switcher */
.theme-switch-wrapper { display: flex; align-items: center; }
.theme-switch { display: inline-block; height: 32px; position: relative; width: 60px; }
.theme-switch input { display: none; }
.slider {
    background-color: var(--toggle-bg);
    bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0;
    transition: .4s; border-radius: 34px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 6px; border: 1px solid var(--header-border);
}
.slider i { font-size: 13px; z-index: 1; pointer-events: none; }
.fa-sun { color: #f9cb28; opacity: 0; transition: 0.3s; }
.fa-moon { color: #cbd5e1; opacity: 1; transition: 0.3s; }
input:checked + .slider:before { transform: translateX(28px); }
input:checked + .slider .fa-sun { opacity: 1; }
input:checked + .slider .fa-moon { opacity: 0; }
.slider:before {
    background-color: #fff; bottom: 3px; content: ""; height: 24px; left: 4px;
    position: absolute; transition: .4s; width: 24px; border-radius: 50%;
    z-index: 2; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.search-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; opacity: 0.8; }

/* --- 4. MATCH INFO BAR (Scoreboard Style) --- */
.match-info-bar {
    background: var(--match-bar-bg);
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    border-bottom: 1px solid var(--header-border);
    box-shadow: var(--card-shadow);
}

.bar-team { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    font-weight: 700; 
    font-size: 16px; 
}
.bar-team.left { justify-content: flex-end; text-align: right; }
.bar-team.right { justify-content: flex-start; text-align: left; }

.bar-team img { 
    width: 40px; 
    height: 40px; 
    object-fit: contain; 
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
}

.status-badge {
    background: #232a3b;
    color: var(--text-secondary);
    padding: 6px 16px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    min-width: 100px;
    text-align: center;
    margin: 0 30px;
    border: 1px solid var(--header-border);
}

.status-badge.live {
    background: var(--live-red);
    color: white;
    border-color: transparent;
    box-shadow: 0 0 15px var(--live-glow);
    animation: pulse 2s infinite;
}

.status-badge.ended {
    background: rgba(0,0,0,0.2);
    color: var(--text-secondary);
    border: 1px dashed var(--text-secondary);
}

.gradient-divider {
    height: 2px;
    width: 100%;
    background: var(--accent-gradient);
}

/* --- 5. PLAYER SECTION --- */
.player-section {
    max-width: 1100px;
    margin: 30px auto;
    padding: 0 20px;
}

.player-container {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: var(--player-bg);
    border-radius: 24px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
    border: 1px solid var(--card-border);
    cursor: pointer;
}

.ui-layer {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 5;
    background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
    text-align: center;
    pointer-events: none;
    transition: opacity 0.5s ease;
}

.play-icon-wrapper {
    width: 90px;
    height: 90px;
    background: var(--live-red);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 40px var(--live-glow);
}

.player-container:hover .play-icon-wrapper {
    transform: scale(1.15);
}

.play-icon-wrapper svg { 
    fill: white; 
    width: 32px; 
    height: 32px; 
    margin-left: 6px; 
}

.status-text { 
    margin-top: 24px; 
    font-size: 18px; 
    font-weight: 600; 
    color: white; 
    text-shadow: 0 2px 10px rgba(0,0,0,0.5); 
}

#locker-modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
    z-index: 10000; justify-content: center; align-items: center;
}

@keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }

@media (max-width: 768px) {
    .match-info-bar { grid-template-columns: 1fr; gap: 15px; }
    .bar-team.left, .bar-team.right { justify-content: center; text-align: center; }
    .status-badge { order: -1; margin: 0 auto; width: fit-content; }
    .bar-team img { width: 32px; height: 32px; }
    .logo { font-size: 18px; }
}
</style>
</head>
<body>
<header>
    <div class="theme-switch-wrapper">
        <label class="theme-switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider">
                <i class="fa-solid fa-moon"></i>
                <i class="fa-solid fa-sun"></i>
            </span>
        </label>
    </div>
    <div class="logo">PLAYRAY</div>
    <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
</header>
<div class="gradient-divider"></div>

<div class="match-info-bar" id="match-bar">
    <!-- Dynamic Content -->
</div>

<section class="player-section">
    <div class="player-container" id="video-trigger" onclick="startStream()">
        <div class="ui-layer" id="player-ui">
            <div class="play-icon-wrapper" id="play-btn-circle">
                <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <div class="status-text" id="status-label">Tap to start live stream</div>
        </div>
    </div>
</section>

<div id="locker-modal"></div>

<script>
    // THEME ENGINE
    const themeToggle = document.getElementById('theme-toggle');
    function setTheme(mode) {
        document.documentElement.setAttribute('data-theme', mode);
        themeToggle.checked = (mode === 'light');
        localStorage.setItem('playray-theme', mode);
    }

    const savedTheme = localStorage.getItem('playray-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
    setTheme(savedTheme || (prefersDark.matches ? 'dark' : 'light'));
    themeToggle.addEventListener('change', () => setTheme(themeToggle.checked ? 'light' : 'dark'));

    // SYNCED STATUS LOGIC FROM INDEX.HTML
    function getStatus(iso) {
        const diff = Math.floor((new Date(iso) - new Date()) / 60000);
        if (diff > 10) {
            const h = Math.floor(diff / 60);
            const m = diff % 60;
            const str = h > 0 ? (m === 0 ? `${h}h` : `${h}h ${m} min`) : `${diff} min`;
            return { text: `UPCOMING IN ${str}`, class: "", live: false, ended: false };
        }
        if (diff <= 10 && diff > 0) return { text: "PRE-GAME", class: "pregame", live: false, ended: false };
        if (diff <= 0 && diff > -150) return { text: "• LIVE NOW", class: "live", live: true, ended: false };
        return { text: "GAME ENDED", class: "ended", live: false, ended: true };
    }

    function initDynamicMatch() {
        const params = new URLSearchParams(window.location.search);
        const matchTime = params.get('time');
        
        const match = {
            team1: params.get('t1') || "Team A",
            team2: params.get('t2') || "Team B",
            logo1: params.get('l1') || "https://loodibee.com/wp-content/uploads/nba-logo.png",
            logo2: params.get('l2') || "https://loodibee.com/wp-content/uploads/nba-logo.png"
        };

        // Determine status dynamically using the same logic as index.html
        const status = getStatus(matchTime);

        // Map logic results to CSS classes defined in stream.html
        let badgeClass = "status-badge";
        if (status.live) badgeClass += " live";
        if (status.ended) badgeClass += " ended";

        // Update Match Info Bar
        document.getElementById('match-bar').innerHTML = `
            <div class="bar-team left">
                <span>${match.team1}</span>
                <img src="${match.logo1}" alt="${match.team1}">
            </div>
            <div class="${badgeClass}">${status.text}</div>
            <div class="bar-team right">
                <img src="${match.logo2}" alt="${match.team2}">
                <span>${match.team2}</span>
            </div>
        `;
        
        document.title = `${match.team1} vs ${match.team2} - PLAYRAY`;

        // UI Fix for Player Text
        if(status.ended) {
            document.getElementById('status-label').innerText = "Watch Replay";
            document.getElementById('play-btn-circle').style.background = "#475569";
            document.getElementById('play-btn-circle').style.boxShadow = "none";
        } else if (!status.live && !status.ended) {
            document.getElementById('status-label').innerText = "Stream starting soon";
        }
    }


    function startStream() {
    window.location.href = "https://playray.online/sl/ppnex";
}

    initDynamicMatch();

// تحديث الحالة كل 30 ثانية
setInterval(() => {
    initDynamicMatch();
}, 30000);
</script>
</body>
</html>
