<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYRAY - Sports Streaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f1a;
            --card-bg: #1e2533;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --header-bg: #0b0f1a;
            --accent-gradient: linear-gradient(90deg, #ff4d4d, #f9cb28, #20e3b2, #00d2ff);
            --card-shadow: 0 4px 20px rgba(0,0,0,0.3);
            --pill-bg: #2d3748;
            --pill-active: #ffffff;
            --pill-text-active: #000;
            --header-border: rgba(255, 255, 255, 0.1);
            --live-glow: rgba(255, 77, 77, 0.4);
            --toggle-bg: #1e2533;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --header-bg: #ef4444; 
            --pill-bg: #e2e8f0;
            --pill-active: #1e293b;
            --pill-text-active: #ffffff;
            --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
            --header-border: rgba(255, 255, 255, 0.2);
            --live-glow: rgba(239, 68, 68, 0.2);
            --toggle-bg: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding-bottom: 50px;
        }

        header {
            background-color: var(--header-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--header-border);
        }

        .logo { 
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px; 
            font-weight: 800; 
            letter-spacing: 2px; 
            color: white; 
        }

        .theme-switch-wrapper { display: flex; align-items: center; }
        .theme-switch {
            display: inline-block; height: 30px; position: relative; width: 60px;
        }
        .theme-switch input { display: none; }
        .slider {
            background-color: var(--toggle-bg);
            bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0;
            transition: .4s; border-radius: 34px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 6px;
            border: 1px solid var(--header-border);
        }
        .slider i { font-size: 14px; z-index: 1; pointer-events: none; }
        .fa-sun { color: #f9cb28; opacity: 0; transition: 0.3s; }
        .fa-moon { color: #f1f5f9; opacity: 1; transition: 0.3s; }

        .slider:before {
            background-color: #fff; bottom: 3px; content: ""; height: 22px; left: 4px;
            position: absolute; transition: .4s; width: 22px; border-radius: 50%;
            z-index: 2; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        input:checked + .slider:before { transform: translateX(30px); }
        input:checked + .slider .fa-sun { opacity: 1; }
        input:checked + .slider .fa-moon { opacity: 0; }

        .search-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

        /* FILTERS */
        .filter-section { 
            padding: 15px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .categories-scroll {
            display: flex; gap: 12px; overflow-x: auto; white-space: nowrap; padding-bottom: 10px;
        }
        .categories-scroll::-webkit-scrollbar { display: none; }

        .pill {
            background: var(--pill-bg); color: var(--text-secondary);
            padding: 12px 20px; border-radius: 12px; border: none;
            font-size: 14px; cursor: pointer; display: flex; flex-direction: column;
            align-items: center; gap: 6px; min-width: 90px;
        }
        .pill.active { background: var(--pill-active); color: var(--pill-text-active); font-weight: bold; }
        .cat-pill { flex: 0 0 auto; }

        #search-container { 
            display: none; 
            padding: 0 20px 15px; 
            max-width: 1200px;
            margin: 0 auto;
        }
        #search-input {
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid var(--pill-bg);
            background: var(--card-bg); color: var(--text-primary); outline: none;
        }

        /* RESPONSIVE GRID LOGIC */
        #main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .sport-section { margin: 30px 0; }
        .sport-header {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 10px; font-weight: bold; text-transform: uppercase;
        }
        .gradient-line {
            height: 3px; width: 100%; background: var(--accent-gradient);
            border-radius: 2px; margin-bottom: 20px;
        }

        .matches-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 16px; 
        }

        @media (min-width: 768px) { 
            .matches-grid { grid-template-columns: repeat(2, 1fr); gap: 24px; } 
        }

        @media (min-width: 1024px) { 
            .matches-grid { grid-template-columns: repeat(3, 1fr); gap: 30px; } 
        }

        /* MATCH CARD UI */
        .match-card {
            background: var(--card-bg); border-radius: 16px; padding: 18px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--card-shadow); border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .match-card:hover { transform: translateY(-4px); }

        .match-card.live-glow {
            box-shadow: 0 0 20px var(--live-glow);
            border: 1px solid rgba(255, 77, 77, 0.4);
        }

        .teams { display: flex; flex-direction: column; gap: 14px; }
        .team { display: flex; align-items: center; gap: 12px; }
        .team-logo { width: 28px; height: 28px; object-fit: contain; }
        .team-name { font-size: 15px; font-weight: 600; }

        .match-info {
            text-align: right; border-left: 1px solid var(--text-secondary);
            padding-left: 20px; min-width: 130px;
        }

        .status { font-size: 11px; font-weight: 900; margin-bottom: 6px; display: block; letter-spacing: 0.8px; }
        .time { font-size: 13px; color: var(--text-secondary); font-weight: 500; }

        .status-live { color: #ff4d4d; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="theme-switch-wrapper">
            <label class="theme-switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider">
                    <i class="fa-solid fa-moon"></i>
                    <i class="fa-solid fa-sun"></i>
                </span>
            </label>
        </div>
        <div class="logo">PLAYRAY</div>
        <button class="search-btn" id="search-toggle-btn">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </header>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Search matches or teams...">
    </div>

    <section class="filter-section">
        <div class="categories-scroll" id="cat-scroll">
            <button class="pill cat-pill active" data-sport="All Sports">
                <i class="fa-solid fa-border-all"></i><span>All Sports</span>
            </button>
            <button class="pill cat-pill" data-sport="NBA">
                <i class="fa-solid fa-basketball"></i><span>NBA</span>
            </button>
            <button class="pill cat-pill" data-sport="NHL">
                <i class="fa-solid fa-hockey-puck"></i><span>NHL</span>
            </button>
            <button class="pill cat-pill" data-sport="MLB">
                <i class="fa-solid fa-baseball"></i><span>MLB</span>
            </button>
            <button class="pill cat-pill" data-sport="Soccer">
                <i class="fa-solid fa-futbol"></i><span>Soccer</span>
            </button>
            <button class="pill cat-pill" data-sport="WNBA">
                <i class="fa-solid fa-basketball"></i><span>WNBA</span>
            </button>
        </div>
    </section>

    <main id="main-content"></main>

    <script>
        const sportIcons = { "NBA": "fa-basketball", "WNBA": "fa-basketball", "NHL": "fa-hockey-puck", "MLB": "fa-baseball", "Soccer": "fa-futbol" };

        let matchData = [];

async function fetchMatches() {
    const res = await fetch("https://script.google.com/macros/s/AKfycbzsX6uIpHVVeUeiziyBQvKccclN2bEGfAPmEfQkpQMQerRQRLzNI-jHT3D4lSZNIJCF/exec");
    const data = await res.json();

    matchData = data.map(m => ({
        sport: m.sport,
        team1: m.team1,
        team2: m.team2,
        time: m.time,
        logo1: m.logo1,
        logo2: m.logo2,
        live: m.live === "true" || m.live === true,
        priority: parseInt(m.priority) || 999
    }));

    render();
}

        function getRel(m) { return new Date(new Date().getTime() + m * 60000).toISOString(); }

        const themeToggle = document.getElementById('theme-toggle');
        function setTheme(mode, save = true) {
            document.documentElement.setAttribute('data-theme', mode);
            themeToggle.checked = (mode === 'light');
            if(save) localStorage.setItem('playray-theme', mode);
        }

        const saved = localStorage.getItem('playray-theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)');
        setTheme(saved || (systemDark.matches ? 'dark' : 'light'), false);

        themeToggle.addEventListener('change', () => setTheme(themeToggle.checked ? 'light' : 'dark'));

        function getStatus(iso) {
            const diff = Math.floor((new Date(iso) - new Date()) / 60000);
            if (diff > 10) {
                const h = Math.floor(diff / 60);
                const m = diff % 60;
                const str = h > 0 ? (m === 0 ? `${h}h` : `${h}h ${m} min`) : `${diff} min`;
                return { text: `UPCOMING IN ${str}`, class: "status-upcoming", live: false };
            }
            if (diff <= 10 && diff > 0) return { text: "PRE-GAME", class: "status-pregame", live: false };
            if (diff <= 0 && diff > -150) return { text: "• LIVE NOW", class: "status-live", live: true };
            return { text: "ENDED", class: "status-ended", live: false };
        }

        let currentFilter = "All Sports", searchQuery = "";

        function render() {
            const main = document.getElementById('main-content');
            main.innerHTML = '';
            const sports = [...new Set(matchData.map(m => m.sport))];

            sports.forEach(sport => {
                if (currentFilter !== "All Sports" && currentFilter !== sport) return;
                const filtered = matchData.filter(m => m.sport === sport && (m.team1 + m.team2).toLowerCase().includes(searchQuery));
                if (!filtered.length) return;

                const section = document.createElement('div');
                section.className = 'sport-section';
                section.innerHTML = `<div class="sport-header"><i class="fa-solid ${sportIcons[sport]}"></i> ${sport}</div><div class="gradient-line"></div><div class="matches-grid"></div>`;
                
                const grid = section.querySelector('.matches-grid');
                filtered.forEach(m => {
                    const status = getStatus(m.time);
                    const card = document.createElement('div');
                    card.className = `match-card ${status.live ? 'live-glow' : ''}`;
                    
                    // PASS DATA DYNAMICALLY
                    card.onclick = () => {
                        const params = new URLSearchParams({
                            t1: m.team1,
                            t2: m.team2,
                            l1: m.logo1,
                            l2: m.logo2,
                            live: status.live
                        });
                        window.location.href = `stream.html?${params.toString()}`;
                    };

                    card.innerHTML = `
                        <div class="teams">
                            <div class="team"><img src="${m.logo1}" class="team-logo"><span class="team-name">${m.team1}</span></div>
                            <div class="team"><img src="${m.logo2}" class="team-logo"><span class="team-name">${m.team2}</span></div>
                        </div>
                        <div class="match-info">
                            <span class="status ${status.class}">${status.text}</span>
                            <span class="time">Today ${new Date(m.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                        </div>`;
                    grid.appendChild(card);
                });
                main.appendChild(section);
            });
        }

        document.getElementById('search-toggle-btn').onclick = () => {
            const sc = document.getElementById('search-container');
            sc.style.display = sc.style.display === 'block' ? 'none' : 'block';
        };
        document.getElementById('search-input').oninput = (e) => { searchQuery = e.target.value.toLowerCase(); render(); };
        document.getElementById('cat-scroll').onclick = (e) => {
            const btn = e.target.closest('.cat-pill');
            if (!btn) return;
            document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.sport;
            render();
        };

        fetchMatches();
        setInterval(fetchMatches, 180000);
    </script>
</body>
</html>
