<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLAYRAY - Live Stream</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* --- 1. VARIABLES & THEMES --- */
:root {
--bg-color: #0b0f1a;
--card-bg: #1e2533;
--card-border: rgba(255, 255, 255, 0.08);
--text-primary: #ffffff;
--text-secondary: #94a3b8;
--header-bg: rgba(11, 15, 26, 0.9);
--accent-gradient: linear-gradient(90deg, #ff5f00, #ffc400, #20e2af, #00d2ff, #7a5fff, #ff2d55);
--card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
--pill-bg: #232a3b;
--header-border: rgba(255, 255, 255, 0.08);
--live-red: #dc2626; 
--live-glow: rgba(220, 38, 38, 0.4);
--toggle-bg: #232a3b;
--player-bg: #0f172a;
--match-bar-bg: #161b26;
}

[data-theme="light"] {
    --bg-color: #f1f5f9;
    --card-bg: #ffffff;
    --card-border: rgba(0, 0, 0, 0.08);
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --header-bg: #dc2626; 
    --header-border: rgba(255, 255, 255, 0.2);
    --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    --toggle-bg: rgba(0,0,0,0.1);
    --match-bar-bg: #ffffff;
    --player-bg: #ffffff;
}

/* --- 2. BASE STYLES --- */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, sans-serif;
    transition: background-color 0.3s ease, color 0.3s ease;
}

body {
    background-color: var(--bg-color);
    color: var(--text-primary);
    padding-bottom: 50px;
    -webkit-font-smoothing: antialiased;
}

/* --- 3. HEADER --- */
header {
    background-color: var(--header-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid var(--header-border);
}

.logo { 
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px; 
    font-weight: 900; 
    letter-spacing: 1px; 
    color: #fff; 
    text-transform: uppercase;
}

.theme-switch-wrapper { display: flex; align-items: center; }
.theme-switch { display: inline-block; height: 32px; position: relative; width: 60px; }
.theme-switch input { display: none; }
.slider {
    background-color: var(--toggle-bg);
    bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0;
    transition: .4s; border-radius: 34px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 6px; border: 1px solid var(--header-border);
}
.slider i { font-size: 13px; z-index: 1; pointer-events: none; }
.fa-sun { color: #f9cb28; opacity: 0; transition: 0.3s; }
.fa-moon { color: #cbd5e1; opacity: 1; transition: 0.3s; }
input:checked + .slider:before { transform: translateX(28px); }
input:checked + .slider .fa-sun { opacity: 1; }
input:checked + .slider .fa-moon { opacity: 0; }
.slider:before {
    background-color: #fff; bottom: 3px; content: ""; height: 24px; left: 4px;
    position: absolute; transition: .4s; width: 24px; border-radius: 50%;
    z-index: 2; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.search-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; opacity: 0.8; }

/* --- 4. MATCH INFO BAR --- */
.match-info-bar {
    background: var(--match-bar-bg);
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    border-bottom: 1px solid var(--header-border);
    box-shadow: var(--card-shadow);
}

.bar-team { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    font-weight: 700; 
    font-size: 16px; 
}
.bar-team.left { justify-content: flex-end; text-align: right; }
.bar-team.right { justify-content: flex-start; text-align: left; }

.bar-team img { 
    width: 40px; 
    height: 40px; 
    object-fit: contain; 
}

.status-badge {
    background: #232a3b;
    color: var(--text-secondary);
    padding: 6px 16px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1px;
    text-transform: uppercase;
    min-width: 100px;
    text-align: center;
    margin: 0 30px;
    border: 1px solid var(--header-border);
}

.status-badge.live {
    background: var(--live-red);
    color: white;
    border-color: transparent;
    box-shadow: 0 0 15px var(--live-glow);
    animation: pulse 2s infinite;
}

.status-badge.ended {
    background: rgba(0,0,0,0.1);
    color: var(--text-secondary);
}

.gradient-divider {
    height: 2px;
    width: 100%;
    background: var(--accent-gradient);
}

/* --- 5. CTA CONVERSION SECTION --- */
.player-section {
    max-width: 1100px;
    margin: 30px auto;
    padding: 0 20px;
}

.player-container {
    width: 100%;
    min-height: 450px;
    background: var(--player-bg);
    border-radius: 28px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.4);
    border: 1px solid var(--card-border);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.cta-content {
    max-width: 600px;
    padding: 40px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.fubo-brand {
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-secondary);
    margin-bottom: -10px;
    opacity: 0.8;
}

.fubo-brand span { color: #ff5f00; }

.cta-headline {
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 800;
    line-height: 1.2;
    color: var(--text-primary);
}

.cta-subtext {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 10px;
}

.main-cta-btn {
    background-color: var(--live-red);
    color: white;
    padding: 20px 48px;
    border-radius: 20px;
    font-size: 20px;
    font-weight: 800;
    border: none;
    cursor: pointer;
    box-shadow: 0 10px 25px var(--live-glow);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-decoration: none;
}

.main-cta-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 15px 30px var(--live-glow);
}

.trust-elements {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 15px;
}

.trust-item {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
}

.trust-item i {
    color: #20e2af;
    font-size: 14px;
}

/* Background Overlay Effect */
.player-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, rgba(32, 226, 175, 0.05) 0%, transparent 70%);
    pointer-events: none;
}

/* Logic Styling for Ended State */
.ended-mode .main-cta-btn {
    background-color: #475569;
    box-shadow: none;
}

#locker-modal {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98);
    z-index: 10000; justify-content: center; align-items: center;
}

@keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.98); } 100% { opacity: 1; transform: scale(1); } }

@media (max-width: 768px) {
    .match-info-bar { grid-template-columns: 1fr; gap: 15px; }
    .bar-team.left, .bar-team.right { justify-content: center; text-align: center; }
    .status-badge { order: -1; margin: 0 auto; width: fit-content; }
    .player-container { min-height: 400px; padding: 20px; }
    .cta-headline { font-size: 28px; }
}
</style>
</head>
<body>
<header>
    <div class="theme-switch-wrapper">
        <label class="theme-switch">
            <input type="checkbox" id="theme-toggle">
            <span class="slider">
                <i class="fa-solid fa-moon"></i>
                <i class="fa-solid fa-sun"></i>
            </span>
        </label>
    </div>
    <div class="logo">PLAYRAY</div>
    <button class="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
</header>
<div class="gradient-divider"></div>

<div class="match-info-bar" id="match-bar">
    <!-- Dynamic Content -->
</div>

<section class="player-section">
    <div class="player-container" id="cta-container">
        <div class="cta-content">
            <h1 class="cta-headline" id="dynamic-headline">Don't Miss a Second - Watch Live Now</h1>
            <p class="cta-subtext" id="dynamic-subtext">Instant access to this live game - no cable needed.</p>
            
            <button class="main-cta-btn" id="cta-button" onclick="startStream()">
                Start Watching Now
            </button>

            <div class="trust-elements" id="trust-elements">
                <div class="trust-item"><i class="fa-solid fa-circle-check"></i> No cable. No contracts.</div>
                <div class="trust-item"><i class="fa-solid fa-circle-check"></i> 7-day free access</div>
                <div class="trust-item"><i class="fa-solid fa-circle-check"></i> Cancel anytime in one click</div>
            </div>
        </div>
    </div>
</section>

<div id="locker-modal"></div>

<script>
    // --- THEME ENGINE ---
    const themeToggle = document.getElementById('theme-toggle');
    function setTheme(mode) {
        document.documentElement.setAttribute('data-theme', mode);
        themeToggle.checked = (mode === 'light');
        localStorage.setItem('playray-theme', mode);
    }

    const savedTheme = localStorage.getItem('playray-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
    setTheme(savedTheme || (prefersDark.matches ? 'dark' : 'light'));
    themeToggle.addEventListener('change', () => setTheme(themeToggle.checked ? 'light' : 'dark'));

    // --- STATUS LOGIC ---
    function getStatus(iso) {
        const diff = Math.floor((new Date(iso) - new Date()) / 60000);
        if (diff > 10) {
            const h = Math.floor(diff / 60);
            const m = diff % 60;
            const str = h > 0 ? (m === 0 ? `${h}h` : `${h}h ${m} min`) : `${diff} min`;
            return { text: `UPCOMING IN ${str}`, class: "", live: false, ended: false };
        }
        if (diff <= 10 && diff > 0) return { text: "PRE-GAME", class: "pregame", live: false, ended: false };
        if (diff <= 0 && diff > -150) return { text: "• LIVE NOW", class: "live", live: true, ended: false };
        return { text: "GAME ENDED", class: "ended", live: false, ended: true };
    }

    function initDynamicMatch() {
        const params = new URLSearchParams(window.location.search);
        const matchTime = params.get('time');
        
        const match = {
            team1: params.get('t1') || "Team A",
            team2: params.get('t2') || "Team B",
            logo1: params.get('l1') || "https://loodibee.com/wp-content/uploads/nba-logo.png",
            logo2: params.get('l2') || "https://loodibee.com/wp-content/uploads/nba-logo.png"
        };

        const status = getStatus(matchTime);

        // Update Top Scoreboard
        let badgeClass = "status-badge";
        if (status.live) badgeClass += " live";
        if (status.ended) badgeClass += " ended";

        document.getElementById('match-bar').innerHTML = `
            <div class="bar-team left">
                <span>${match.team1}</span>
                <img src="${match.logo1}" alt="${match.team1}">
            </div>
            <div class="${badgeClass}">${status.text}</div>
            <div class="bar-team right">
                <img src="${match.logo2}" alt="${match.team2}">
                <span>${match.team2}</span>
            </div>
        `;
        
        document.title = `${match.team1} vs ${match.team2} - PLAYRAY`;

        // --- CTA SECTION UPDATES ---
        const headline = document.getElementById('dynamic-headline');
        const ctaBtn = document.getElementById('cta-button');
        const ctaContainer = document.getElementById('cta-container');
        const subtext = document.getElementById('dynamic-subtext');

        if(status.ended) {
            headline.innerText = "Missed It? Watch the Full Replay Now";
            subtext.innerText = "Catch every moment you missed - full replay available instantly.";
            ctaBtn.innerText = "Watch Full Replay";
            ctaContainer.classList.add('ended-mode');
        } else if (status.live) {
            headline.innerText = "You're Missing the Game - Watch Live Now";
            subtext.innerText = "Instant access to this live game - no cable needed.";
            ctaBtn.innerText = "Start Watching Now";
            ctaContainer.classList.remove('ended-mode');
        } else {
            headline.innerText = "Kickoff is Coming - Don't Miss It";
            subtext.innerText = "Get instant access before the game starts and be ready to watch live the moment it begins.";
            ctaBtn.innerText = "Unlock Access Now";
            ctaContainer.classList.remove('ended-mode');
        }
    }

    function startStream() {
        window.location.href = "https://www.fubo.tv/signin";
    }

    initDynamicMatch();

    setInterval(() => {
        initDynamicMatch();
    }, 30000);
</script>
</body>
</html>
